name: minio_sync
description: "A cross-platform background service for Odoo MinIO sync"
publish_to: 'none'

version: 1.0.18+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # MinIO & Networking
  minio_new: ^1.0.2
  http: ^0.13.6
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_cors_headers: any
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  
  # Desktop/Tray Integration
  tray_manager: ^0.2.2
  window_manager: ^0.4.0
  screen_retriever: ^0.1.9
  launch_at_startup: ^0.3.0
  
  # Crypto
  crypto: ^3.0.3

  # Configuration & Utilities
  path: ^1.9.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  logger: ^2.5.0
  file_picker: ^8.1.2
  
  # Background Services (Mobile)
  flutter_foreground_task: ^8.0.0
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.ico
