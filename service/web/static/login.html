<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinIO Service - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            background: #f8f9fa;
            border-radius: 12px 12px 0 0;
            padding: 2rem;
            text-align: center;
        }

        .login-header i {
            font-size: 2.5rem;
            color: #667eea;
        }

        .login-body {
            padding: 2rem;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.6rem;
        }

        .btn-login:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="card login-card">
        <div class="login-header">
            <i class="fas fa-database"></i>
            <h4 class="mt-2 mb-0">MinIO Service</h4>
            <small class="text-muted">Sign in with your Odoo account</small>
        </div>
        <div class="login-body">
            <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-globe me-1"></i> Odoo URL</label>
                    <input type="url" class="form-control" id="odoo-url" placeholder="http://localhost:8069" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-database me-1"></i> Database</label>
                    <input type="text" class="form-control" id="odoo-db" placeholder="odoo" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-1"></i> Username</label>
                    <input type="text" class="form-control" id="username" placeholder="admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login w-100" id="btn-login">
                    <i class="fas fa-sign-in-alt me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        // Check if already authenticated — redirect to main app
        (async function () {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = '/';
                }
            } catch (e) { }
        })();

        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('btn-login');
            const errorEl = document.getElementById('error-alert');
            errorEl.classList.add('d-none');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: document.getElementById('odoo-url').value.trim(),
                        db: document.getElementById('odoo-db').value.trim(),
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.classList.remove('d-none');
                }
            } catch (err) {
                errorEl.textContent = 'Connection error: ' + err.message;
                errorEl.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-1"></i> Sign In';
            }
        }
    </script>
</body>

</html>
